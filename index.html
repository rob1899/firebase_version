<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Heating Schedule Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Timeline Grid Background */
        .timeline-grid {
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to right, #f8fafc 1px, transparent 1px);
            background-size: 4.1666% 100%, 1.0416% 100%; /* Hours and 15-min intervals */
        }
        
        /* Hide scrollbar completely for the swipeable mobile tracks */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        /* Hide number input spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

    <!-- App Layout: Stack on Mobile, Side-by-Side on PC -->
    <div class="flex flex-col md:flex-row min-h-screen">
        
        <!-- SIDEBAR -->
        <div class="w-full md:w-64 bg-white shadow-lg flex-shrink-0 flex flex-col z-10">
            <div class="p-4 bg-blue-600 text-white flex justify-between items-center">
                <h1 class="text-xl font-bold">Heating Schedule</h1>
            </div>
            
            <!-- Mobile scrollable room list -->
            <div class="flex-1 overflow-y-auto p-3 max-h-[30vh] md:max-h-full">
                <!-- Ground Floor -->
                <div class="mb-4">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-2">Ground Floor</h3>
                    <div id="gf-rooms" class="space-y-1"></div>
                </div>
                <!-- First Floor -->
                <div>
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-2">First Floor</h3>
                    <div id="ff-rooms" class="space-y-1"></div>
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="flex-1 flex flex-col h-full w-full overflow-hidden">
            <div class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8">
                
                <!-- Main Header -->
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4 border-b border-gray-200 pb-4">
                    <div class="flex items-center gap-3">
                        <h2 id="current-room-title" class="text-2xl font-bold text-gray-800">Select a Room</h2>
                        <span id="main-temp-display" class="text-sm font-bold text-blue-700 bg-blue-50 px-2 py-1 rounded shadow-sm hidden"></span>
                    </div>
                    
                    <!-- Action Buttons -->
                    <div class="flex flex-wrap items-center gap-2" id="action-buttons" style="display: none;">
                        <button id="btn-copy-room" onclick="copyRoomSchedule()" class="px-4 py-2 bg-gray-200 rounded text-sm font-medium hover:bg-gray-300 transition-colors shadow-sm">
                            Copy Weekly Schedule
                        </button>
                        <button id="btn-paste-room" onclick="pasteRoomSchedule()" class="px-4 py-2 bg-blue-100 text-blue-800 rounded text-sm font-medium hover:bg-blue-200 transition-colors shadow-sm">
                            Paste Weekly Schedule
                        </button>
                        
                        <!-- Settings 3-Dot Menu -->
                        <div class="relative ml-2">
                            <button id="menu-btn" onclick="toggleMenu(event)" class="p-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition-colors shadow-sm focus:outline-none" title="Settings">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path></svg>
                            </button>
                            <div id="settings-menu" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-md shadow-xl border border-gray-200 z-50 overflow-hidden">
                                <!-- Hidden input for the actual file upload -->
                                <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importLocalConfig(event)">
                                <button onclick="document.getElementById('import-file').click(); toggleMenu(event);" class="block w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-100 border-b border-gray-100 flex items-center gap-2">
                                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                    Upload config.json
                                </button>
                                <button onclick="exportConfigToJSON(); toggleMenu(event);" class="block w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-100 flex items-center gap-2">
                                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                    Backup config.json
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Timelines Container -->
                <div id="timelines-container" class="space-y-4 w-full max-w-6xl">
                    <div class="flex items-center justify-center h-64 text-gray-400 bg-white rounded shadow-sm border border-gray-200 border-dashed">
                        Loading schedules...
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- EVENT EDITOR MODAL -->
    <div id="event-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h3 id="modal-title" class="text-lg font-bold text-gray-800">Edit Heating Block</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
            </div>
            
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Target Temperature (°C)</label>
                    <div class="flex items-center">
                        <button type="button" onclick="adjustTemp(-0.5)" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-l-md border border-gray-300 hover:bg-gray-300 font-bold text-xl focus:outline-none transition-colors touch-manipulation">-</button>
                        <input type="number" id="modal-temp" step="0.5" class="w-full text-center border-y border-x-0 border-gray-300 px-3 py-2 focus:outline-none font-bold text-lg text-gray-800" style="-moz-appearance: textfield;">
                        <button type="button" onclick="adjustTemp(0.5)" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-r-md border border-gray-300 hover:bg-gray-300 font-bold text-xl focus:outline-none transition-colors touch-manipulation">+</button>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-700 mb-1">Start Time</label>
                        <input type="time" id="modal-start" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-700 mb-1">End Time</label>
                        <input type="time" id="modal-end" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
            </div>

            <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex justify-between items-center">
                <button id="modal-delete-btn" onclick="deleteEvent()" class="text-red-600 hover:text-red-800 font-bold text-sm">Delete Block</button>
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-600 bg-white border border-gray-300 hover:bg-gray-50 rounded-md font-medium transition-colors shadow-sm">Cancel</button>
                    <button onclick="saveEvent()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md font-medium transition-colors shadow-sm">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN SCRIPT -->
    <script>
        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            // REPLACE THESE WITH YOUR ACTUAL FIREBASE DETAILS
            apiKey: "YOUR_API_KEY",
            authDomain: "heatingagendacontroller.firebaseapp.com",
            databaseURL: "https://heatingagendacontroller-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "heatingagendacontroller",
            storageBucket: "heatingagendacontroller.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // ==========================================
        // 2. APP STATE 
        // ==========================================
        let appState = {
            rooms: [
                { id: 'gf_livingroom', code: 'gf_livingroom', name: 'Living Room', floor: 'GF' },
                { id: 'gf_kitchen', code: 'gf_kitchen', name: 'Kitchen', floor: 'GF' },
                { id: 'gf_office', code: 'gf_office', name: 'Office', floor: 'GF' },
                { id: 'gf_entrance', code: 'gf_entrance', name: 'Entrance', floor: 'GF' },
                { id: 'ff_parents', code: 'ff_parents', name: 'Parents Bedroom', floor: 'FF' },
                { id: 'ff_bathparents', code: 'ff_bathparents', name: 'Parents Bath', floor: 'FF' },
                { id: 'ff_julien', code: 'ff_julien', name: 'Julien', floor: 'FF' },
                { id: 'ff_nico', code: 'ff_nico', name: 'Nico', floor: 'FF' },
                { id: 'ff_sam', code: 'ff_sam', name: 'Sam', floor: 'FF' },
                { id: 'ff_bathkids', code: 'ff_bathkids', name: 'Kids Bath', floor: 'FF' }
            ],
            selectedRoom: null,
            events: {}, 
            clipboard: null,
            dayClipboard: null,
            liveTemps: {}
        };

        let currentEdit = { dayIdx: null, eventIdx: null }; 

        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

        // ==========================================
        // 3. INITIALIZATION & FIREBASE SAVING
        // ==========================================
        async function init() {
            listenForSchedules(); // Load config from Firebase
            listenForLiveTemperatures(); // Start HA real-time listener
            renderSidebar();
        }

        function listenForSchedules() {
            db.ref('heatingConfig').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.events) {
                        appState.events = data.events;
                    }
                }

                // FIX: Ensure all rooms have 7 arrays to prevent crashes on empty days
                appState.rooms.forEach(r => {
                    if (!appState.events[r.id]) {
                        appState.events[r.id] = [[],[],[],[],[],[],[]];
                    } else {
                        for (let i = 0; i < 7; i++) {
                            if (!appState.events[r.id][i]) {
                                appState.events[r.id][i] = [];
                            }
                        }
                    }
                });

                // Default to Living Room on initial load if nothing is selected yet
                if (!appState.selectedRoom) {
                    selectRoom('gf_livingroom');
                } else {
                    renderAllTimelines();
                }
            });
        }

        async function saveConfigToServer() {
            try {
                await db.ref('heatingConfig').set({
                    events: appState.events,
                    lastUpdated: new Date().toISOString()
                });
            } catch (error) {
                console.error('Error saving config to Firebase:', error);
                alert("Failed to save to Firebase! Please check your Firebase Security Rules.");
            }
        }

        // ==========================================
        // 4. LIVE TEMPERATURES (HOME ASSISTANT)
        // ==========================================
        function listenForLiveTemperatures() {
            db.ref('liveTemps').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    appState.liveTemps = snapshot.val();
                    updateLiveTempDisplays();
                }
            });
        }

        function updateLiveTempDisplays() {
            if (!appState.liveTemps) return;
            
            appState.rooms.forEach(room => {
                const tempSpan = document.getElementById(`sidebar-temp-${room.code}`);
                const roomData = appState.liveTemps[room.code];
                if (tempSpan && roomData && roomData.temp !== undefined) {
                    tempSpan.innerText = `${roomData.temp}°C`;
                }
            });

            if (appState.selectedRoom) {
                const selectedRoomObj = appState.rooms.find(r => r.id === appState.selectedRoom);
                const mainTempSpan = document.getElementById('main-temp-display');
                if (selectedRoomObj && mainTempSpan) {
                    const data = appState.liveTemps[selectedRoomObj.code];
                    if (data && data.temp !== undefined) {
                        mainTempSpan.innerText = `Current: ${data.temp}°C`;
                        mainTempSpan.classList.remove('hidden');
                    } else {
                        mainTempSpan.classList.add('hidden');
                    }
                }
            }
        }

        // ==========================================
        // 5. UI RENDERING
        // ==========================================
        
        // Hide settings menu when clicking outside
        window.onclick = function(event) {
            const menu = document.getElementById('settings-menu');
            if (menu && !menu.classList.contains('hidden') && !event.target.closest('#menu-btn') && !event.target.closest('#settings-menu')) {
                menu.classList.add('hidden');
            }
        }

        function toggleMenu(event) {
            event.stopPropagation();
            document.getElementById('settings-menu').classList.toggle('hidden');
        }

        function renderSidebar() {
            const gfContainer = document.getElementById('gf-rooms');
            const ffContainer = document.getElementById('ff-rooms');
            gfContainer.innerHTML = ''; ffContainer.innerHTML = '';

            appState.rooms.forEach(room => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-3 py-2.5 rounded text-sm font-medium transition-colors flex justify-between items-center ${appState.selectedRoom === room.id ? 'bg-blue-100 text-blue-800' : 'text-gray-700 hover:bg-gray-100'}`;
                btn.id = `room-btn-${room.id}`;
                btn.onclick = () => selectRoom(room.id);
                
                btn.innerHTML = `<span class="truncate">${room.name}</span> <span id="sidebar-temp-${room.code}" class="text-xs text-gray-500 font-bold ml-2 whitespace-nowrap"></span>`;
                
                if (room.floor === 'GF') gfContainer.appendChild(btn);
                else ffContainer.appendChild(btn);
            });
            updateLiveTempDisplays();
        }

        function selectRoom(roomId) {
            appState.selectedRoom = roomId;
            const roomObj = appState.rooms.find(r => r.id === roomId);
            document.getElementById('current-room-title').innerText = roomObj.name;
            document.getElementById('action-buttons').style.display = 'flex';
            
            renderSidebar();
            renderAllTimelines();
            updateLiveTempDisplays();
        }

        function getTempColor(temp) {
            if (temp < 18) return 'bg-blue-400 border-blue-500';
            if (temp < 21) return 'bg-green-400 border-green-500';
            if (temp < 23) return 'bg-yellow-400 border-yellow-500';
            return 'bg-red-400 border-red-500';
        }

        function renderAllTimelines() {
            const container = document.getElementById('timelines-container');
            container.innerHTML = '';

            const events = appState.events[appState.selectedRoom] || [[],[],[],[],[],[],[]];

            DAYS.forEach((day, dIdx) => {
                const dayRow = document.createElement('div');
                dayRow.className = "flex flex-col md:flex-row md:items-center gap-2 md:gap-4 mb-5";

                const dayLabel = document.createElement('div');
                dayLabel.className = "w-full md:w-24 font-bold text-gray-700 pl-1 shrink-0";
                dayLabel.innerText = day;

                const scrollWrapper = document.createElement('div');
                scrollWrapper.className = "flex-1 w-full overflow-x-auto pb-2 touch-pan-x hide-scrollbar";

                const track = document.createElement('div');
                track.className = "relative h-12 min-w-[700px] md:min-w-full bg-white rounded timeline-grid border border-gray-300 cursor-pointer shadow-sm";
                
                track.onclick = (e) => {
                    if (e.target !== track) return; 
                    const rect = track.getBoundingClientRect();
                    const clickX = e.clientX - rect.left;
                    const percent = clickX / track.offsetWidth; 
                    const clickMins = percent * 1440;
                    
                    const snappedMins = Math.round(clickMins / 15) * 15;
                    openNewEventModal(dIdx, snappedMins);
                };

                events[dIdx].forEach((ev, evIdx) => {
                    const block = document.createElement('div');
                    block.className = `absolute h-full rounded shadow-sm border ${getTempColor(ev.temp)} flex items-center justify-center text-xs font-bold text-white hover:opacity-90 hover:scale-y-105 transition-transform cursor-pointer`;
                    
                    const leftPct = (ev.start / 1440) * 100;
                    const widthPct = ((ev.end - ev.start) / 1440) * 100;
                    
                    block.style.left = `${leftPct}%`;
                    block.style.width = `${widthPct}%`;
                    block.innerText = `${ev.temp}°`;
                    
                    block.onclick = (e) => {
                        e.stopPropagation();
                        openEditModal(dIdx, evIdx);
                    };
                    
                    track.appendChild(block);
                });

                scrollWrapper.appendChild(track);

                // Copy/Paste buttons moved to the far right side
                const dayBtnGroup = document.createElement('div');
                dayBtnGroup.className = "flex gap-2 shrink-0 self-end md:self-auto mb-2 md:mb-0";

                const copyDayBtn = document.createElement('button');
                copyDayBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>';
                copyDayBtn.title = "Copy " + day + " Schedule";
                copyDayBtn.className = "p-2 text-gray-500 hover:text-blue-600 bg-white rounded border border-gray-200 shadow-sm transition-colors flex items-center justify-center";
                copyDayBtn.onclick = (e) => copyDaySchedule(dIdx, e);

                const pasteDayBtn = document.createElement('button');
                pasteDayBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>';
                pasteDayBtn.title = "Paste to " + day;
                pasteDayBtn.className = "p-2 text-gray-500 hover:text-blue-600 bg-white rounded border border-gray-200 shadow-sm transition-colors flex items-center justify-center";
                pasteDayBtn.onclick = () => pasteDaySchedule(dIdx);

                dayBtnGroup.appendChild(copyDayBtn);
                dayBtnGroup.appendChild(pasteDayBtn);

                dayRow.appendChild(dayLabel);
                dayRow.appendChild(scrollWrapper);
                dayRow.appendChild(dayBtnGroup); // Placed at the end of the row
                
                container.appendChild(dayRow);
            });
        }

        // ==========================================
        // 6. EDITING SCHEDULES (THE MODAL)
        // ==========================================
        
        function minsToTime(mins) {
            const h = Math.floor(mins / 60).toString().padStart(2, '0');
            const m = (mins % 60).toString().padStart(2, '0');
            return `${h}:${m}`;
        }

        function timeToMins(timeStr) {
            if (!timeStr) return 0;
            const [h, m] = timeStr.split(':');
            return parseInt(h) * 60 + parseInt(m);
        }

        function adjustTemp(amount) {
            const tempInput = document.getElementById('modal-temp');
            let currentVal = parseFloat(tempInput.value) || 21;
            let newVal = currentVal + amount;
            
            if (newVal < 5) newVal = 5;
            if (newVal > 35) newVal = 35;
            
            tempInput.value = Number(newVal.toFixed(1));
        }

        function openNewEventModal(dayIdx, startMins) {
            currentEdit = { dayIdx: dayIdx, eventIdx: null }; 
            
            document.getElementById('modal-title').innerText = "Add New Heating Block";
            document.getElementById('modal-delete-btn').style.display = 'none'; 
            
            let endMins = startMins + 120; 
            if (endMins > 1440) endMins = 1440;
            
            document.getElementById('modal-temp').value = 21;
            document.getElementById('modal-start').value = minsToTime(startMins);
            document.getElementById('modal-end').value = minsToTime(endMins);
            
            document.getElementById('event-modal').classList.remove('hidden');
        }

        function openEditModal(dayIdx, eventIdx) {
            currentEdit = { dayIdx: dayIdx, eventIdx: eventIdx };
            const ev = appState.events[appState.selectedRoom][dayIdx][eventIdx];
            
            document.getElementById('modal-title').innerText = "Edit Heating Block";
            document.getElementById('modal-delete-btn').style.display = 'block'; 
            
            document.getElementById('modal-temp').value = ev.temp;
            document.getElementById('modal-start').value = minsToTime(ev.start);
            document.getElementById('modal-end').value = minsToTime(ev.end);
            
            document.getElementById('event-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('event-modal').classList.add('hidden');
        }

        async function saveEvent() {
            const temp = parseFloat(document.getElementById('modal-temp').value);
            const startMins = timeToMins(document.getElementById('modal-start').value);
            const endMins = timeToMins(document.getElementById('modal-end').value);
            
            if (isNaN(temp) || isNaN(startMins) || isNaN(endMins) || startMins >= endMins) {
                alert("Please enter valid times and temperatures.");
                return;
            }

            const roomEvents = appState.events[appState.selectedRoom][currentEdit.dayIdx];

            if (currentEdit.eventIdx === null) {
                roomEvents.push({ start: startMins, end: endMins, temp: temp });
            } else {
                roomEvents[currentEdit.eventIdx].temp = temp;
                roomEvents[currentEdit.eventIdx].start = startMins;
                roomEvents[currentEdit.eventIdx].end = endMins;
            }
            
            renderAllTimelines();
            await saveConfigToServer(); 
            closeModal();
        }

        async function deleteEvent() {
            if (currentEdit.eventIdx !== null && confirm("Are you sure you want to delete this block?")) {
                appState.events[appState.selectedRoom][currentEdit.dayIdx].splice(currentEdit.eventIdx, 1);
                renderAllTimelines();
                await saveConfigToServer(); 
                closeModal();
            }
        }

        // ==========================================
        // 7. COPY / PASTE (No Dialogs)
        // ==========================================
        function copyRoomSchedule() {
            if (!appState.selectedRoom) return;
            appState.clipboard = JSON.parse(JSON.stringify(appState.events[appState.selectedRoom]));
            
            const btn = document.getElementById('btn-copy-room');
            const orig = btn.innerHTML;
            btn.innerHTML = "✓ Copied";
            btn.classList.add('bg-green-100', 'text-green-800');
            setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('bg-green-100', 'text-green-800'); }, 1500);
        }

        async function pasteRoomSchedule() {
            if (!appState.selectedRoom || !appState.clipboard) return;
            
            appState.events[appState.selectedRoom] = JSON.parse(JSON.stringify(appState.clipboard));
            renderAllTimelines();
            await saveConfigToServer();

            const btn = document.getElementById('btn-paste-room');
            const orig = btn.innerHTML;
            btn.innerHTML = "✓ Pasted";
            btn.classList.add('bg-green-100', 'text-green-800');
            setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('bg-green-100', 'text-green-800'); }, 1500);
        }

        function copyDaySchedule(dayIdx, event) {
            if (!appState.selectedRoom) return;
            appState.dayClipboard = JSON.parse(JSON.stringify(appState.events[appState.selectedRoom][dayIdx]));
            
            const btn = event.currentTarget;
            const orig = btn.innerHTML;
            btn.innerHTML = '<svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
            setTimeout(() => { if(document.body.contains(btn)) btn.innerHTML = orig; }, 1500);
        }

        async function pasteDaySchedule(dayIdx) {
            if (!appState.selectedRoom || !appState.dayClipboard) return;
            
            appState.events[appState.selectedRoom][dayIdx] = JSON.parse(JSON.stringify(appState.dayClipboard));
            renderAllTimelines(); // Re-renders the timeline instantly to show paste success
            await saveConfigToServer();
        }

        // ==========================================
        // 8. IMPORT / EXPORT LOCAL CONFIG.JSON
        // ==========================================
        function exportConfigToJSON() {
            // Build the JSON object exactly like the old python server did
            const payload = {
                events: appState.events,
                lastUpdated: new Date().toISOString()
            };
            
            const dataStr = JSON.stringify(payload, null, 4);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'config_backup.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importLocalConfig(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.events) {
                        // Leaving this one confirm dialog because uploading a file wipes the ENTIRE house schedule
                        if (confirm("Are you sure you want to overwrite your ENTIRE Firebase schedule with this file?")) {
                            
                            const oldToNewMap = {
                                '1': 'gf_livingroom', '2': 'gf_kitchen', '3': 'gf_office', '4': 'gf_entrance',
                                '5': 'ff_parents', '6': 'ff_bathparents', '7': 'ff_julien', '8': 'ff_nico',
                                '9': 'ff_sam', '10': 'ff_bathkids'
                            };
                            
                            let migratedEvents = {};
                            for (let key in data.events) {
                                let newKey = oldToNewMap[key] || key;
                                migratedEvents[newKey] = data.events[key];
                            }
                            
                            appState.events = migratedEvents;
                            
                            appState.rooms.forEach(r => {
                                if (!appState.events[r.id]) {
                                    appState.events[r.id] = [[],[],[],[],[],[],[]];
                                } else {
                                    for (let i = 0; i < 7; i++) {
                                        if (!appState.events[r.id][i]) {
                                            appState.events[r.id][i] = [];
                                        }
                                    }
                                }
                            });

                            renderAllTimelines();
                            await saveConfigToServer();
                        }
                    } else {
                        alert("Invalid config.json format. No 'events' object found.");
                    }
                } catch (err) {
                    console.error("Parse error:", err);
                    alert("Error reading the JSON file.");
                }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        }

        // Boot the app
        init();

    </script>
</body>
</html>
