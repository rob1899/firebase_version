<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Heating Schedule Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Custom scrollbar for main areas */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Timeline Grid Background */
        .timeline-grid {
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to right, #f8fafc 1px, transparent 1px);
            background-size: 4.1666% 100%, 1.0416% 100%; /* Hours and 15-min intervals */
        }
        
        /* Hide scrollbar completely for the swipeable mobile tracks */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">

    <!-- App Layout: Stack on Mobile, Side-by-Side on PC -->
    <div class="flex flex-col md:flex-row min-h-screen">
        
        <!-- SIDEBAR -->
        <div class="w-full md:w-64 bg-white border-b md:border-b-0 md:border-r border-slate-200 flex-shrink-0 flex flex-col shadow-sm z-10">
            <div class="p-4 border-b border-slate-100 bg-slate-50">
                <h1 class="text-lg font-extrabold text-slate-800 flex items-center gap-2">
                    <span class="text-2xl">🔥</span> Heating Control
                </h1>
            </div>
            
            <!-- Mobile scrollable room list -->
            <div class="flex-1 overflow-y-auto p-3 max-h-[30vh] md:max-h-full">
                <!-- Ground Floor -->
                <div class="mb-6">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 px-3">Ground Floor</h3>
                    <div id="gf-rooms" class="space-y-1"></div>
                </div>
                <!-- First Floor -->
                <div>
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 px-3">First Floor</h3>
                    <div id="ff-rooms" class="space-y-1"></div>
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="flex-1 flex flex-col h-full overflow-hidden w-full">
            <div class="flex-1 overflow-y-auto p-4 md:p-8">
                
                <!-- Main Header -->
                <div class="flex flex-col lg:flex-row lg:items-center justify-between mb-8 gap-4">
                    <div class="flex items-center gap-3">
                        <h2 id="current-room-title" class="text-2xl font-bold text-slate-800">Select a Room</h2>
                        <span id="main-temp-display" class="text-sm font-bold text-amber-600 bg-amber-50 px-2.5 py-1 rounded-md border border-amber-200 shadow-sm hidden transition-all"></span>
                    </div>
                    
                    <!-- Action Buttons -->
                    <div class="flex flex-wrap items-center gap-2" id="action-buttons" style="display: none;">
                        <button onclick="copyRoomSchedule()" class="px-3 py-1.5 bg-white border border-slate-300 rounded text-sm font-medium hover:bg-slate-50 transition-colors shadow-sm">
                            📄 Copy Schedule
                        </button>
                        <button onclick="pasteRoomSchedule()" class="px-3 py-1.5 bg-white border border-slate-300 rounded text-sm font-medium hover:bg-slate-50 transition-colors shadow-sm">
                            📋 Paste
                        </button>
                        <button onclick="importFromGoogle()" id="btn-sync" class="px-3 py-1.5 bg-blue-600 text-white rounded text-sm font-medium hover:bg-blue-700 transition-colors shadow-sm ml-auto lg:ml-2">
                            🔄 Google Sync
                        </button>
                    </div>
                </div>

                <!-- Timelines Container -->
                <div id="timelines-container" class="space-y-6 w-full max-w-6xl">
                    <div class="flex items-center justify-center h-64 text-slate-400 bg-white rounded-xl border border-slate-200 border-dashed">
                        👈 Select a room from the sidebar to view schedules
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- MAIN SCRIPT -->
    <script>
        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            // REPLACE THESE WITH YOUR ACTUAL FIREBASE DETAILS
            apiKey: "YOUR_API_KEY",
            authDomain: "heatingagendacontroller.firebaseapp.com",
            databaseURL: "https://heatingagendacontroller-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "heatingagendacontroller",
            storageBucket: "heatingagendacontroller.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // ==========================================
        // 2. APP STATE
        // ==========================================
        let appState = {
            rooms: [
                { id: '1', code: 'gf_livingroom', name: 'Living Room', floor: 'GF' },
                { id: '2', code: 'gf_kitchen', name: 'Kitchen', floor: 'GF' },
                { id: '3', code: 'gf_office', name: 'Office', floor: 'GF' },
                { id: '4', code: 'gf_entrance', name: 'Entrance', floor: 'GF' },
                { id: '5', code: 'ff_parents', name: 'Parents Bedroom', floor: 'FF' },
                { id: '6', code: 'ff_bathparents', name: 'Parents Bath', floor: 'FF' },
                { id: '7', code: 'ff_julien', name: 'Julien', floor: 'FF' },
                { id: '8', code: 'ff_nico', name: 'Nico', floor: 'FF' },
                { id: '9', code: 'ff_sam', name: 'Sam', floor: 'FF' },
                { id: '10', code: 'ff_bathkids', name: 'Kids Bath', floor: 'FF' }
            ],
            selectedRoom: null,
            events: {}, // events[roomId][dayIndex] = [{start, end, temp}]
            clipboard: null,
            liveTemps: {}
        };

        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

        // ==========================================
        // 3. INITIALIZATION & DATA LOADING
        // ==========================================
        async function init() {
            // Pre-fill empty events array
            appState.rooms.forEach(r => {
                if (!appState.events[r.id]) {
                    appState.events[r.id] = [[],[],[],[],[],[],[]];
                }
            });

            renderSidebar();
            listenForSchedules();
            listenForLiveTemperatures();
        }

        function listenForSchedules() {
            db.ref('heatingConfig').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.events) {
                        appState.events = data.events;
                        if (appState.selectedRoom) renderAllTimelines();
                    }
                }
            });
        }

        async function saveConfigToServer() {
            try {
                await db.ref('heatingConfig').set({
                    events: appState.events,
                    lastUpdated: new Date().toISOString()
                });
            } catch (err) {
                console.error("Failed to save to Firebase:", err);
            }
        }

        // ==========================================
        // 4. LIVE TEMPERATURES (HOME ASSISTANT)
        // ==========================================
        function listenForLiveTemperatures() {
            db.ref('liveTemps').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    appState.liveTemps = snapshot.val();
                    updateLiveTempDisplays();
                }
            });
        }

        function updateLiveTempDisplays() {
            if (!appState.liveTemps) return;
            
            // Update Sidebar
            appState.rooms.forEach(room => {
                const tempSpan = document.getElementById(`sidebar-temp-${room.code}`);
                const roomData = appState.liveTemps[room.code];
                if (tempSpan && roomData && roomData.temp !== undefined) {
                    tempSpan.innerText = `${roomData.temp}°C`;
                }
            });

            // Update Header
            if (appState.selectedRoom) {
                const selectedRoomObj = appState.rooms.find(r => r.id === appState.selectedRoom);
                const mainTempSpan = document.getElementById('main-temp-display');
                if (selectedRoomObj && mainTempSpan) {
                    const data = appState.liveTemps[selectedRoomObj.code];
                    if (data && data.temp !== undefined) {
                        mainTempSpan.innerText = `Current: ${data.temp}°C`;
                        mainTempSpan.classList.remove('hidden');
                    } else {
                        mainTempSpan.classList.add('hidden');
                    }
                }
            }
        }

        // ==========================================
        // 5. UI RENDERING
        // ==========================================
        function renderSidebar() {
            const gfContainer = document.getElementById('gf-rooms');
            const ffContainer = document.getElementById('ff-rooms');
            gfContainer.innerHTML = ''; ffContainer.innerHTML = '';

            appState.rooms.forEach(room => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-3 py-2.5 md:py-2 rounded-md text-sm md:text-sm font-medium transition-colors flex justify-between items-center ${appState.selectedRoom === room.id ? 'bg-blue-50 text-blue-700 shadow-inner' : 'text-slate-600 hover:bg-slate-100'}`;
                btn.id = `room-btn-${room.id}`;
                btn.onclick = () => selectRoom(room.id);
                
                btn.innerHTML = `<span class="truncate">${room.name}</span> <span id="sidebar-temp-${room.code}" class="text-xs text-slate-400 font-bold ml-2 whitespace-nowrap"></span>`;
                
                if (room.floor === 'GF') gfContainer.appendChild(btn);
                else ffContainer.appendChild(btn);
            });
            updateLiveTempDisplays();
        }

        function selectRoom(roomId) {
            appState.selectedRoom = roomId;
            const roomObj = appState.rooms.find(r => r.id === roomId);
            document.getElementById('current-room-title').innerText = roomObj.name;
            document.getElementById('action-buttons').style.display = 'flex';
            
            renderSidebar();
            renderAllTimelines();
            updateLiveTempDisplays();
        }

        function getTempColor(temp) {
            if (temp < 18) return 'bg-blue-400 border-blue-500';
            if (temp < 21) return 'bg-emerald-400 border-emerald-500';
            if (temp < 23) return 'bg-amber-400 border-amber-500';
            return 'bg-red-400 border-red-500';
        }

        function renderAllTimelines() {
            const container = document.getElementById('timelines-container');
            container.innerHTML = '';

            const events = appState.events[appState.selectedRoom] || [[],[],[],[],[],[],[]];

            DAYS.forEach((day, dIdx) => {
                const dayRow = document.createElement('div');
                // Stack vertically on mobile, side-by-side on PC
                dayRow.className = "flex flex-col lg:flex-row lg:items-center gap-2 lg:gap-4 mb-6";

                const dayLabel = document.createElement('div');
                dayLabel.className = "w-full lg:w-24 font-bold text-slate-700 pl-1";
                dayLabel.innerText = day;

                // --- MOBILE SWIPEABLE WRAPPER ---
                const scrollWrapper = document.createElement('div');
                // overflow-x-auto enables swiping, touch-pan-x makes it smooth on phones
                scrollWrapper.className = "w-full overflow-x-auto pb-2 touch-pan-x hide-scrollbar";

                const track = document.createElement('div');
                // min-w-[700px] guarantees the bar never gets squished on mobile!
                // h-14 makes the bar taller for easier thumb-tapping!
                track.className = "relative h-14 min-w-[700px] lg:min-w-full bg-white rounded-lg timeline-grid border border-slate-200 cursor-pointer shadow-sm";
                
                track.onclick = (e) => {
                    if (e.target !== track) return; 
                    const rect = track.getBoundingClientRect();
                    const clickX = e.clientX - rect.left;
                    // Calculate based on the scrollable width, not the screen width
                    const percent = clickX / track.offsetWidth; 
                    const clickMins = percent * 1440;
                    
                    // Snap to nearest 15 mins
                    const snappedMins = Math.round(clickMins / 15) * 15;
                    addNewEvent(dIdx, snappedMins);
                };

                // Render specific heating blocks
                events[dIdx].forEach((ev, evIdx) => {
                    const block = document.createElement('div');
                    block.className = `absolute h-full rounded shadow-sm border ${getTempColor(ev.temp)} flex items-center justify-center text-xs font-bold text-white hover:opacity-90 hover:scale-y-105 transition-transform cursor-pointer`;
                    
                    const leftPct = (ev.start / 1440) * 100;
                    const widthPct = ((ev.end - ev.start) / 1440) * 100;
                    
                    block.style.left = `${leftPct}%`;
                    block.style.width = `${widthPct}%`;
                    block.innerText = `${ev.temp}°`;
                    
                    block.onclick = (e) => {
                        e.stopPropagation();
                        editOrDeleteEvent(dIdx, evIdx);
                    };
                    
                    track.appendChild(block);
                });

                scrollWrapper.appendChild(track);
                dayRow.appendChild(dayLabel);
                dayRow.appendChild(scrollWrapper);
                container.appendChild(dayRow);
            });
        }

        // ==========================================
        // 6. EDITING SCHEDULES
        // ==========================================
        function addNewEvent(dayIdx, startMins) {
            let tempInput = prompt("Enter Target Temperature (°C):", "21");
            if (tempInput === null) return;
            let temp = parseFloat(tempInput);
            if (isNaN(temp)) return;

            // Default length is 2 hours (120 mins)
            let endMins = startMins + 120;
            if (endMins > 1440) endMins = 1440;

            appState.events[appState.selectedRoom][dayIdx].push({ start: startMins, end: endMins, temp: temp });
            saveConfigToServer();
            renderAllTimelines();
        }

        function editOrDeleteEvent(dayIdx, eventIdx) {
            const action = prompt("Type 'e' to edit temperature, or 'd' to delete this block:", "e");
            if (action === 'd') {
                appState.events[appState.selectedRoom][dayIdx].splice(eventIdx, 1);
                saveConfigToServer();
                renderAllTimelines();
            } else if (action === 'e') {
                let currentTemp = appState.events[appState.selectedRoom][dayIdx][eventIdx].temp;
                let newTemp = prompt("New Temperature:", currentTemp);
                if (newTemp !== null && !isNaN(parseFloat(newTemp))) {
                    appState.events[appState.selectedRoom][dayIdx][eventIdx].temp = parseFloat(newTemp);
                    saveConfigToServer();
                    renderAllTimelines();
                }
            }
        }

        // ==========================================
        // 7. COPY / PASTE
        // ==========================================
        function copyRoomSchedule() {
            if (!appState.selectedRoom) return;
            appState.clipboard = JSON.parse(JSON.stringify(appState.events[appState.selectedRoom]));
            alert("Schedule copied! Select another room and click Paste.");
        }

        function pasteRoomSchedule() {
            if (!appState.selectedRoom || !appState.clipboard) {
                alert("Nothing copied to clipboard!");
                return;
            }
            if(confirm("Overwrite this room's entire schedule with the copied schedule?")) {
                appState.events[appState.selectedRoom] = JSON.parse(JSON.stringify(appState.clipboard));
                saveConfigToServer();
                renderAllTimelines();
            }
        }

        // ==========================================
        // 8. GOOGLE SYNC (Placeholder based on snippet)
        // ==========================================
        async function importFromGoogle() {
            const btn = document.getElementById('btn-sync');
            const originalText = btn.innerHTML;
            btn.innerHTML = "Syncing...";
            
            try {
                // If you have a specific Google Apps Script or backend that parses Calendar events, 
                // you would fetch it here. Example:
                // const response = await fetch('YOUR_API_URL');
                // const calendarData = await response.json();
                
                // For now, this just simulates a successful click
                setTimeout(() => {
                    btn.innerHTML = "Sync Complete!";
                    btn.classList.add('bg-green-600');
                    setTimeout(() => { 
                        btn.innerHTML = originalText; 
                        btn.classList.remove('bg-green-600');
                    }, 2000);
                }, 1000);
                
            } catch (error) {
                console.error(error);
                btn.innerHTML = "Error!";
                btn.classList.add('bg-red-600');
                setTimeout(() => { btn.innerHTML = originalText; btn.classList.remove('bg-red-600'); }, 2000);
            }
        }

        // Boot the app
        init();

    </script>
</body>
</html>
